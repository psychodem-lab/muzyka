<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Muzycznik</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/?size=48&id=h4yHYv3voiN1&format=png&color=228BE6">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#228BE6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    
    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-sidebar: #ffffff;
            --bg-main: #ffffff;
            --bg-controls: rgba(255, 255, 255, 0.9);
            --text-main: #212529;
            --text-muted: #6c757d;
            --text-song: #111111;
            --text-chords: #e85d04;
            --border-color: #e9ecef;
            --accent-success: #10b981;
            --accent-blue: #3b82f6;
            --accent-hover: #eff6ff;
            --lyrics-font-size: 18px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        body.dark-mode {
            --bg-body: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-main: #0f172a;
            --bg-controls: rgba(30, 41, 59, 0.9);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-song: #ffffff;
            --text-chords: #fb923c;
            --border-color: #334155;
            --accent-hover: #334155;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s; 
            overflow: hidden; 
            text-align: left;
            -webkit-tap-highlight-color: transparent;
        }

        #app-container { 
            display: flex; 
            height: 100vh;
            width: 100vw; 
            position: relative; 
        }
        
        #sidebar { 
            width: 320px;
            border-right: 1px solid var(--border-color); 
            background: var(--bg-sidebar); 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 20; 
            box-shadow: var(--shadow-sm);
        }

        .sidebar-header { 
            display: flex; gap: 10px; align-items: center; margin-bottom: 15px;
        }

        select, input[type="text"], input[type="number"], textarea {
            background-color: var(--bg-body);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        select:focus, input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .filter-buttons {
            display: flex; gap: 8px; margin-bottom: 15px;
        }
        .filter-buttons button {
            flex: 1; padding: 10px 5px; font-size: 13px; font-weight: 500;
            border-radius: var(--radius-sm); border: 1px solid var(--border-color);
            background: var(--bg-sidebar); color: var(--text-muted);
        }
        .filter-buttons button.active {
            background: var(--accent-blue); color: white; border-color: var(--accent-blue);
        }

        #song-list { 
            list-style: none; padding: 0; margin: 0; 
            overflow-y: auto; flex-grow: 1; 
            border-radius: var(--radius-sm);
        }
        #song-list::-webkit-scrollbar { width: 6px; }
        #song-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        #song-list li { 
            padding: 14px 12px; 
            border-bottom: 1px solid var(--border-color);
            cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center;
            border-radius: var(--radius-sm);
            margin-bottom: 2px;
            transition: background 0.1s;
        }
        #song-list li:hover { background: var(--accent-hover); }
        #song-list li.selected { 
            background: var(--accent-blue); 
            color: white; 
            box-shadow: var(--shadow-sm);
        }
        .fav-star { color: #cbd5e1; transition: 0.2s; padding: 5px; font-size: 18px; }
        .fav-star.active { color: #fbbf24; text-shadow: 0 0 5px rgba(251, 191, 36, 0.4); }

        #main-content { 
            flex-grow: 1; overflow-y: auto; 
            background: var(--bg-main); 
            scroll-behavior: smooth; position: relative;
            z-index: 10; touch-action: pan-y; 
        }

        #controls-bar { 
            display: flex; gap: 10px; padding: 12px 20px; 
            background: var(--bg-controls);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color); 
            position: sticky; top: 0; z-index: 30; 
            align-items: center; overflow-x: auto;
            box-shadow: var(--shadow-sm);
        }

        .control-group { 
            display: flex; align-items: center; gap: 8px; 
            background: var(--bg-body);
            padding: 6px 12px; border-radius: 20px; 
            white-space: nowrap; border: 1px solid var(--border-color);
        }

        button { 
            cursor: pointer; padding: 10px 16px;
            border: 1px solid var(--border-color); 
            border-radius: var(--radius-sm); 
            background: var(--bg-sidebar); color: var(--text-main); 
            font-size: 14px; font-weight: 500;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.97); }
        
        .btn-icon { 
            border: none; background: transparent; font-size: 20px; 
            padding: 8px; border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
        }
        .btn-icon:hover { background: var(--border-color); color: var(--text-main); }
        
        .metro-active {
            color: var(--accent-success) !important;
            animation: pulse-metro 0.5s infinite alternate;
        }
        @keyframes pulse-metro {
            from { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            to { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        }

        #settings-menu { 
            display: none; position: absolute; top: 70px; right: 20px; 
            background: var(--bg-sidebar); border: 1px solid var(--border-color); 
            padding: 20px; border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg); flex-direction: column; gap: 15px; 
            min-width: 280px; z-index: 100; overflow-y: auto; max-height: calc(100vh - 90px);
        }
        #settings-menu.active { display: flex; animation: slideInMenu 0.2s ease-out; }
        
        @keyframes slideInMenu {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input[type="range"] { width: 100%; accent-color: var(--accent-blue); }

        #song-capture-area { 
            padding: 30px; max-width: 900px; margin: 0 auto;
            color: var(--text-song); min-height: 100%; 
        }
        
        .song-header { text-align: center; margin-bottom: 30px; }
        .song-header h2 { margin: 0 0 5px 0; font-size: 28px; font-weight: 700; }
        .song-header h4 { margin: 0; color: var(--text-muted); font-weight: 400; font-size: 16px; }
        
        .chords-container { 
            background: var(--bg-body); border-left: 4px solid var(--accent-blue);
            padding: 15px 20px; margin: 20px 0; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; 
            box-shadow: var(--shadow-sm);
        }
        #active-chords-content { 
            font-family: 'Courier New', monospace; font-size: calc(var(--lyrics-font-size) * 0.9); 
            white-space: pre-wrap; margin: 0; font-weight: 600; color: var(--text-main);
        }
        .lyrics-content { 
            white-space: pre-wrap; font-size: var(--lyrics-font-size);
            line-height: 1.8; margin-top: 20px; color: var(--text-song); font-weight: 500;
        }
        .inline-chord { 
            font-weight: 800; color: var(--text-chords); cursor: pointer;
            padding: 0 2px; border-radius: 3px; background: rgba(232, 93, 4, 0.05);
        }

        #editor-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%;
            height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 1000; justify-content: center; align-items: center; padding: 15px;
        }
        .modal-content { 
            background: var(--bg-sidebar); padding: 25px; border-radius: var(--radius-md); 
            width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; 
            box-shadow: var(--shadow-lg); animation: scaleIn 0.2s ease-out;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .editor-field { margin-bottom: 15px; }
        .editor-field label { 
            display: block; font-size: 13px; font-weight: 700; 
            margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase;
        }

        .connection-dot { 
            display:inline-block; width:10px; height:10px; border-radius:50%; 
            background:#ef4444; margin-right:6px; box-shadow: 0 0 5px rgba(239, 68, 68, 0.5);
        }
        .connection-dot.connected { background: var(--accent-success); box-shadow: 0 0 5px rgba(16, 185, 129, 0.5); }

        .mobile-only { display: none; }
        
        @media (max-width: 768px) {
            #sidebar { 
                position: absolute; left: 0; top: 0; bottom: 0; 
                width: 100%; box-sizing: border-box; 
            }
            #main-content { 
                position: absolute; left: 0; top: 0; bottom: 0; width: 100%; 
                transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            body.song-active #main-content { transform: translateX(0); }
            body.song-active #sidebar { transform: translateX(-30%); opacity: 0; }
            .mobile-only { display: inline-flex !important; }
            
            #controls-bar { padding: 10px; gap: 6px; }
            .control-group { padding: 4px 8px; }
            .btn-icon { width: 36px; height: 36px; font-size: 18px; }
            
            #settings-menu { 
                right: 15px; left: 15px; width: auto !important; top: 65px; 
            }
            #song-capture-area { padding: 20px 15px; }
        }
    </style>
</head>
<body>

<div id="progress-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter: blur(5px); color:white; z-index:2100; flex-direction:column; align-items:center; justify-content:center;">
    <div style="background:var(--bg-sidebar); padding:30px; border-radius:var(--radius-md); text-align:center; color:var(--text-main); box-shadow:var(--shadow-lg);">
        <h2 style="margin-top:0;">Eksportuję...</h2>
        <p id="progress-count" style="font-size:20px; font-weight:bold; margin-bottom:0;">0/0</p>
    </div>
</div>

<div id="editor-modal">
    <div class="modal-content">
        <h3 style="margin-top:0; border-bottom:1px solid var(--border-color); padding-bottom:10px;">➕ Edytor Utworu</h3>
        
        <div class="editor-field">
            <label>Tytuł</label>
            <input type="text" id="edit-title" placeholder="np. Dzisiaj w Betlejem">
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="editor-field" style="flex: 2;">
                <label>Wykonawca</label>
                <input type="text" id="edit-artist" placeholder="np. Kolęda">
            </div>
            <div class="editor-field" style="flex: 1;">
                <label>BPM (Tempo)</label>
                <input type="number" id="edit-bpm" placeholder="120">
            </div>
        </div>

        <div class="editor-field">
            <label>Treść (Używaj [C] dla akordów lub sekcji ---CHORDS---)</label>
            <textarea id="edit-lyrics" style="height: 250px; font-family: 'Courier New', monospace; resize: vertical;" placeholder="Wpisz tekst piosenki..."></textarea>
        </div>

        <div style="display:flex; gap:10px; margin-top: 25px;">
            <button onclick="closeEditor()" style="flex:1; background:transparent; border:1px solid var(--border-color);">Anuluj</button>
            <button onclick="saveSongData()" style="flex:2; background:var(--accent-success); color:white; font-weight:bold; border:none; box-shadow:var(--shadow-md);">ZAPISZ ZMIANY</button>
        </div>
    </div>
</div>

<div id="app-container">
    <div id="sidebar">
        <div class="sidebar-header">
            <select id="collection-select" style="flex-grow:1; font-weight: 600;">
                <option value="piosenki.json">📁 Piosenki (Główna)</option>
                <option value="koledy.json">🎄 Kolędy</option>
                <option value="lukasz.json">👤 Inne</option>
                <option value="favorites">⭐ Ulubione</option>
            </select>
            <button class="btn-icon" onclick="openSettings(event)"><i class="fas fa-cog"></i></button>
        </div>
        
        <div class="filter-buttons">
            <button id="filter-male" onclick="setFilter('male')">♂ Męski</button>
            <button id="filter-female" onclick="setFilter('female')">♀ Żeński</button>
            <button id="filter-all" class="active" onclick="setFilter('')">Wszystkie</button>
        </div>
        
        <div style="position: relative; margin-bottom:15px;">
            <i class="fas fa-search" style="position:absolute; left:12px; top:14px; color:var(--text-muted);"></i>
            <input type="text" id="search" placeholder="Szukaj utworu..." style="width: 100%; padding:12px 12px 12px 35px; border-radius: 20px;">
        </div>
        
        <ul id="song-list"></ul>
    </div>

    <div id="main-content">
        <div id="controls-bar" style="display:none;">
            <button onclick="backToList()" class="mobile-only btn-icon"><i class="fas fa-arrow-left"></i></button>
            
            <div class="control-group">
                <button onclick="changeTrans(-1)" class="btn-icon"><i class="fas fa-minus"></i></button>
                <span id="transpose-val" onclick="resetTrans()" style="font-weight:bold; min-width:30px; text-align:center; cursor:pointer; padding: 0 5px; font-size:18px;" title="Resetuj">0</span>
                <button onclick="changeTrans(1)" class="btn-icon"><i class="fas fa-plus"></i></button>
            </div>

            <div class="control-group">
                <button id="btn-scroll-toggle" onclick="toggleScroll()" class="btn-icon"><i class="fas fa-play"></i></button>
                <input type="range" id="scroll-speed" min="1" max="75" value="10" style="width:60px;">
            </div>
            
            <button onclick="toggleMetronome()" id="btn-metro-toggle" class="btn-icon" style="margin-left:5px;"><i class="fas fa-drum"></i></button>
            
            <div style="flex-grow: 1;"></div>
            <button class="btn-icon" onclick="openSettings(event)"><i class="fas fa-ellipsis-v"></i></button>
        </div>

        <div id="settings-menu">
            <div style="font-size:13px; font-weight:700; color:var(--text-muted); display:flex; justify-content:space-between;">
                <span>TEMPO (BPM)</span> <span id="bpm-val" style="color:var(--text-main);">120</span>
            </div>
            <input type="range" id="bpm-slider" min="40" max="240" value="120" oninput="setBPM(this.value)">
            
            <hr style="border:0; border-top:1px solid var(--border-color); margin:5px 0;">
            
            <div style="font-size:13px; font-weight:700; color:var(--text-muted); display:flex; justify-content:space-between;">
                <span>ROZMIAR TEKSTU</span> <span id="font-size-val" style="color:var(--text-main);">18px</span>
            </div>
            <input type="range" id="font-size-slider" min="12" max="60" value="18" oninput="setFontSize(this.value)">
            
            <button onclick="toggleChordsDisplay()" id="btn-toggle-chords" style="width:100%; text-align:left;"><i class="fas fa-eye-slash" style="width:20px;"></i> Ukryj akordy</button>
            <button onclick="toggleChordStyle()" id="btn-chord-style" style="width:100%; text-align:left;"><i class="fas fa-music" style="width:20px;"></i> Styl: Polski (H)</button>
            <button onclick="toggleDarkMode()" style="width:100%; text-align:left;"><i class="fas fa-moon" style="width:20px;"></i> Tryb nocny</button>
            
            <div id="mqtt-sync-section" style="border: 1px solid var(--border-color); padding: 15px; border-radius: var(--radius-sm); margin-top: 5px; background: rgba(0,0,0,0.02);">
                <div style="font-size: 12px; font-weight: 700; margin-bottom: 10px; color:var(--text-muted);">
                    <span id="conn-status-dot" class="connection-dot"></span> SYNCHRONIZACJA
                </div>
                <input type="text" id="mqtt-room-code" placeholder="Hasło pokoju..." style="margin-bottom:10px;">
                <div style="display:flex; gap:8px;">
                    <button onclick="connectMQTT(true)" style="flex:1; background:var(--accent-blue); color:white; border:none; padding:8px;">LIDER</button>
                    <button onclick="connectMQTT(false)" style="flex:1; padding:8px;">SŁUCHACZ</button>
                </div>
                <div id="mqtt-status-text" style="font-size:11px; font-weight:600; color:var(--accent-success); margin-top:8px; min-height:14px; text-align:center;"></div>
            </div>

            <hr style="border:0; border-top:1px solid var(--border-color); margin:5px 0;">
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <button onclick="startEditCurrent()"><i class="fas fa-edit"></i> Edytuj</button>
                <button onclick="startNewSong()"><i class="fas fa-plus"></i> Dodaj</button>
                <button onclick="document.getElementById('import-file').click()"><i class="fas fa-upload"></i> Import</button>
                <input type="file" id="import-file" style="display:none" onchange="importJSON(this)">
                <button onclick="exportJSON()"><i class="fas fa-download"></i> Kopia zapasowa</button>
            </div>
 
            <button onclick="exportAllJPG()" style="background:var(--accent-success); color:white; border:none; margin-top:5px;"><i class="fas fa-file-image"></i> Eksportuj jako obrazy (JPG)</button>
            <button onclick="resetFromServer()" style="background:#ef4444; color:white; border:none;"><i class="fas fa-sync-alt"></i> Zresetuj z serwera</button>
        </div>

        <div id="song-capture-area">
            <div id="song-display">
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; color:var(--text-muted); font-size:18px; text-align:center;">
                    <i class="fas fa-guitar" style="font-size:48px; margin-bottom:15px; opacity:0.5;"></i>
                    Wybierz utwór z listy, aby rozpocząć
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }

    const SCALE = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    
    let allSongs = [];
    let currentLibrary = "piosenki.json";
    let favorites = JSON.parse(localStorage.getItem('favSongs') || '[]');
    let currentId = null, lastId = null, transpose = 0, showChords = true;
    let chordStyle = localStorage.getItem('chordStyle') || 'PL'; 
    let scrollInterval = null, isScrolling = false, metroInterval = null, isMetroActive = false;
    let currentFontSize = 18;
    let currentBPM = 120;
    let mqttClient = null, isMaster = false, mqttTopic = "";
    let currentFilter = "";
    
    let audioCtx = null;

    document.addEventListener('DOMContentLoaded', () => {
        updateChordStyleButton();
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('settings-menu');
            if (menu.classList.contains('active') && !menu.contains(e.target) && !e.target.closest('.btn-icon')) {
                menu.classList.remove('active');
            }
        });
        
        const selector = document.getElementById('collection-select');
        switchLibrary(selector.value);
        selector.onchange = (e) => switchLibrary(e.target.value);
        document.getElementById('search').oninput = renderList;
        
        if(localStorage.getItem('mqttRoom')) {
            document.getElementById('mqtt-room-code').value = localStorage.getItem('mqttRoom');
        }
    });

    function setBPM(val) {
        currentBPM = parseInt(val) || 120;
        document.getElementById('bpm-val').textContent = currentBPM;
        document.getElementById('bpm-slider').value = currentBPM;
        if (isMetroActive) {
            stopMetronome();
            startMetronome();
        }
    }

    function toggleChordStyle() {
        chordStyle = chordStyle === 'PL' ? 'EN' : 'PL';
        localStorage.setItem('chordStyle', chordStyle);
        updateChordStyleButton();
        if (currentId) updateView();
    }

    function updateChordStyleButton() {
        const btn = document.getElementById('btn-chord-style');
        if(btn) btn.innerHTML = `<i class="fas fa-music" style="width:20px;"></i> Styl: ${chordStyle === 'PL' ? 'Polski (H)' : 'Angielski (B)'}`;
    }

    function transChord(chordStr, steps) {
        return chordStr.replace(/([a-gA-G][#b]?|[hH])/g, (match) => {
            const isLowercase = (match === match.toLowerCase());
            let base = match.toUpperCase();
            if (base === 'H') base = 'B';
            else if (base === 'BB') base = 'A#';
            else if (base === 'B' && chordStyle === 'PL') base = 'A#';
            
            let idx = SCALE.indexOf(base);
            if (idx === -1) return match;
            let newIdx = (idx + steps % 12 + 12) % 12;
            let res = SCALE[newIdx];
            
            if (chordStyle === 'PL') {
                if (res === 'B') res = 'H';   
                else if (res === 'A#') res = 'B';  
            } else {
                if (res === 'A#') res = 'Bb';
            }
            return isLowercase ? res.toLowerCase() : res;
        });
    }

    window.addEventListener('popstate', (e) => { 
        if (document.body.classList.contains('song-active')) backToList(false); 
    });

    let touchStartX = 0, touchStartY = 0, initialPinchDist = -1;
    document.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
            touchStartX = e.touches[0].screenX;
            touchStartY = e.touches[0].screenY;
        } else if (e.touches.length === 2) {
            initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        }
    }, {passive: false});

    document.addEventListener('touchmove', e => {
        if (e.touches.length === 2 && initialPinchDist > 0) {
            e.preventDefault(); 
            let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            let diff = dist - initialPinchDist;
            if (Math.abs(diff) > 15) { 
                let step = diff > 0 ? 1 : -1;
                let newSize = currentFontSize + step;
                if (newSize >= 12 && newSize <= 60) { setFontSize(newSize); initialPinchDist = dist; }
            }
        }
    }, {passive: false});

    document.addEventListener('touchend', e => {
        if (e.changedTouches.length === 1) {
            let diffX = e.changedTouches[0].screenX - touchStartX;
            let diffY = Math.abs(e.changedTouches[0].screenY - touchStartY);
            if (Math.abs(diffX) > 80 && diffY < 100) {
                if (diffX > 80 && document.body.classList.contains('song-active')) backToList();
                else if (diffX < -80 && !document.body.classList.contains('song-active') && lastId) selectSong(lastId);
            }
        }
        initialPinchDist = -1;
    }, false);

    async function switchLibrary(lib) {
        currentLibrary = lib;
        if (lib === "favorites") {
            const allSaved = [];
            ["piosenki.json", "koledy.json", "lukasz.json"].forEach(key => {
                const data = JSON.parse(localStorage.getItem('db_' + key) || '[]');
                allSaved.push(...data);
            });
            allSongs = allSaved.filter(s => favorites.includes(s.id));
            renderList();
        } else {
            const saved = localStorage.getItem('db_' + lib);
            if (saved) { allSongs = JSON.parse(saved); renderList(); } 
            else { await loadFromServer(lib); }
        }
    }

    async function loadFromServer(fileName) {
        try {
            const res = await fetch(fileName);
            if(!res.ok) throw new Error("Plik nie istnieje");
            const data = await res.json();
            allSongs = data.map((s, i) => ({ ...s, id: fileName + "_" + i }));
            saveToLocal();
            renderList();
        } catch (e) { 
            console.error("Błąd ładowania:", e); 
            allSongs = []; 
            renderList(); 
        }
    }

    function saveToLocal() { 
        if (currentLibrary !== "favorites") {
            localStorage.setItem('db_' + currentLibrary, JSON.stringify(allSongs));
        }
    }
    
    function setFilter(val) {
        currentFilter = val;
        document.querySelectorAll('.filter-buttons button').forEach(b => b.classList.remove('active'));
        if(val === 'male') document.getElementById('filter-male').classList.add('active');
        else if(val === 'female') document.getElementById('filter-female').classList.add('active');
        else document.getElementById('filter-all').classList.add('active');
        renderList();
    }
    
    function renderList() {
        const term = document.getElementById('search').value.toLowerCase();
        const list = document.getElementById('song-list');
        
        let filtered = allSongs.filter(s => {
            const title = (s.title || "").toLowerCase();
            const artist = (s.artist || "").toLowerCase();
            const vocal = (s.vocal_type || "").toLowerCase();
            
            let matchesFilter = true;
            if (currentFilter === "male" || currentFilter === "female") {
                matchesFilter = (vocal === currentFilter);
            }
            
            let matchesSearch = title.includes(term) || artist.includes(term);
            return matchesFilter && matchesSearch;
        });   
              
        list.innerHTML = filtered.sort((a,b)=>a.title.localeCompare(b.title)).map(s => `
            <li onclick="selectSong('${s.id}')" class="${currentId === s.id ? 'selected' : ''}">
                <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right:10px;">
                    <strong style="display:block; font-size:15px; margin-bottom:2px;">${s.title}</strong>
                    <span style="font-size:12px; opacity:0.8;">${s.artist || 'Nieznany wykonawca'}</span>
                </div>
                <i class="fas fa-star fav-star ${favorites.includes(s.id) ? 'active' : ''}" onclick="toggleFav(event, '${s.id}')"></i>
            </li>
        `).join('');
    }

    function selectSong(id, fromSync = false) {
        stopAutoScroll();
        if (currentId && currentId !== id) lastId = currentId; 
        currentId = id; 
        if(!fromSync) transpose = 0;
        
        const song = allSongs.find(s => s.id === id);
        if(song && song.bpm) setBPM(song.bpm);
        else setBPM(120);

        document.getElementById('controls-bar').style.display = "flex";
        document.body.classList.add('song-active');
        
        if (!history.state || history.state.view !== 'song') history.pushState({view: 'song'}, ''); 
        updateView(); 
        renderList();
        
        document.getElementById('main-content').scrollTop = 0;
        if(!fromSync) broadcastState();
        
        document.getElementById('settings-menu').classList.remove('active');
    }

    function backToList(doPopState = true) {
        if (currentId) lastId = currentId;
        document.body.classList.remove('song-active'); 
        stopAutoScroll();
        stopMetronome();
        if (doPopState && history.state && history.state.view === 'song') history.back();
    }

    function updateView() {
        const song = allSongs.find(s => s.id === currentId);
        if (!song) {
            document.getElementById('song-display').innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; color:var(--text-muted); font-size:18px; text-align:center;">
                    <i class="fas fa-guitar" style="font-size:48px; margin-bottom:15px; opacity:0.5;"></i>
                    Wybierz utwór z listy, aby rozpocząć
                </div>`;
            return;
        }
        
        let html = `<div class="song-header"><h2>${song.title}</h2><h4>${song.artist || ''}</h4></div>`;
        
        if (song.chords && showChords) {
            const tc = song.chords.replace(/([a-gA-G][#b]?[\w\d\/#\-]*|[hH][\w\d\/#\-]*)/g, m => transChord(m, transpose));
            html += `<div class="chords-container"><pre id="active-chords-content">${tc}</pre></div>`;
        }
        
        const lyr = (song.lyrics || "").replace(/\[(.*?)\]/g, showChords ? (m, c) => {
            const tc = transChord(c, transpose);
            return `<span class="inline-chord">${tc}</span>`;
        } : '');
        
        document.getElementById('song-display').innerHTML = html + `<div class="lyrics-content">${lyr}</div>`;
        
        const transVal = document.getElementById('transpose-val');
        transVal.textContent = (transpose > 0 ? '+' : '') + transpose;
        if(transpose !== 0) transVal.style.color = "var(--accent-blue)";
        else transVal.style.color = "inherit";
    }

    function changeTrans(v) { transpose += v; updateView(); broadcastState(); }
    function resetTrans() { transpose = 0; updateView(); broadcastState(); }
    
    function setFontSize(v) { 
        currentFontSize = parseInt(v);
        document.documentElement.style.setProperty('--lyrics-font-size', currentFontSize + 'px'); 
        document.getElementById('font-size-val').textContent = currentFontSize + 'px'; 
        if(document.getElementById('font-size-slider')) document.getElementById('font-size-slider').value = currentFontSize;
    }

    function toggleFav(e, id) { 
        e.stopPropagation(); 
        favorites.includes(id) ? favorites = favorites.filter(f=>f!==id) : favorites.push(id); 
        localStorage.setItem('favSongs', JSON.stringify(favorites)); 
        renderList();
    }
    
    function openSettings(e) { 
        e.stopPropagation(); 
        document.getElementById('settings-menu').classList.toggle('active'); 
    }
    
    function toggleChordsDisplay() { 
        showChords = !showChords; 
        document.getElementById('btn-toggle-chords').innerHTML = `<i class="fas fa-eye${showChords ? '-slash' : ''}" style="width:20px;"></i> ${showChords ? 'Ukryj akordy' : 'Pokaż akordy'}`;
        updateView();
    }
    
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    
    function toggleScroll() { 
        isScrolling = !isScrolling;
        const btn = document.getElementById('btn-scroll-toggle');
        if (isScrolling) {
            btn.innerHTML = '<i class="fas fa-pause"></i>';
            btn.style.color = "var(--accent-blue)";
            scrollInterval = setInterval(() => document.getElementById('main-content').scrollTop += 1, 105 - document.getElementById('scroll-speed').value);
        } else {
            btn.innerHTML = '<i class="fas fa-play"></i>';
            btn.style.color = "inherit";
            clearInterval(scrollInterval);
        }
    }
    
    function stopAutoScroll() { 
        if(isScrolling) { 
            clearInterval(scrollInterval);
            isScrolling = false; 
            const btn = document.getElementById('btn-scroll-toggle');
            btn.innerHTML = '<i class="fas fa-play"></i>';
            btn.style.color = "inherit";
        } 
    }

    function toggleMetronome() {
        if (isMetroActive) stopMetronome();
        else startMetronome();
    }

    function startMetronome() {
        isMetroActive = true;
        const btn = document.getElementById('btn-metro-toggle');
        btn.classList.add('metro-active');
        
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const intervalMs = (60 / currentBPM) * 1000;
        
        metroInterval = setInterval(() => {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 1000;
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }, intervalMs);
    }

    function stopMetronome() {
        clearInterval(metroInterval);
        isMetroActive = false;
        const btn = document.getElementById('btn-metro-toggle');
        btn.classList.remove('metro-active');
    }

    function connectMQTT(masterMode) {
        const roomCode = document.getElementById('mqtt-room-code').value.trim();
        if (!roomCode) return alert("Wpisz hasło pokoju!");
        
        localStorage.setItem('mqttRoom', roomCode);
        isMaster = masterMode;
        mqttTopic = "muzycznik_sync_2025/" + roomCode; 
        
        const statusText = document.getElementById('mqtt-status-text');
        statusText.style.color = "var(--text-muted)";
        statusText.textContent = "Łączenie...";
        
        if (mqttClient) mqttClient.end();
        mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        
        mqttClient.on('connect', () => {
            document.getElementById('conn-status-dot').classList.add('connected');
            statusText.style.color = "var(--accent-success)";
            statusText.textContent = isMaster ? "LIDER: Połączono" : "SŁUCHACZ: Połączono";
            if (!isMaster) mqttClient.subscribe(mqttTopic);
            else broadcastState();
        });
        
        mqttClient.on('message', (topic, message) => {
            if (!isMaster && topic === mqttTopic) {
                try {
                    const data = JSON.parse(message.toString());
                    const found = allSongs.find(s => s.title === data.title);
                    if (found) { transpose = data.t; selectSong(found.id, true); }
                } catch (e) { console.error("MQTT Error", e); }
            }
        });
    }

    function broadcastState() {
        if (isMaster && mqttClient && mqttClient.connected) {
            const song = allSongs.find(s => s.id === currentId);
            if (song) mqttClient.publish(mqttTopic, JSON.stringify({ title: song.title, t: transpose }), { retain: true });
        }
    }

    function closeEditor() { document.getElementById('editor-modal').style.display = 'none'; }
    
    function startNewSong() {
        currentId = null;
        document.getElementById('edit-title').value = '';
        document.getElementById('edit-artist').value = '';
        document.getElementById('edit-bpm').value = '120';
        document.getElementById('edit-lyrics').value = '';
        document.getElementById('editor-modal').style.display = 'flex';
        document.getElementById('settings-menu').classList.remove('active');
    }
    
    function startEditCurrent() {
        const s = allSongs.find(x => x.id === currentId);
        if(!s) { alert("Wybierz najpierw piosenkę do edycji."); return; }
        
        document.getElementById('edit-title').value = s.title;
        document.getElementById('edit-artist').value = s.artist || '';
        document.getElementById('edit-bpm').value = s.bpm || '120';
        
        let content = "";
        if (s.chords) {
            content = "---CHORDS---\n" + s.chords + "\n---LYRICS---\n" + s.lyrics;
        } else {
            content = s.lyrics;
        }
        
        document.getElementById('edit-lyrics').value = content;
        document.getElementById('editor-modal').style.display = 'flex';
        document.getElementById('settings-menu').classList.remove('active');
    }

    function saveSongData() {
        const title = document.getElementById('edit-title').value.trim();
        const artist = document.getElementById('edit-artist').value.trim();
        const bpm = document.getElementById('edit-bpm').value.trim();
        let raw = document.getElementById('edit-lyrics').value;
        
        if (!title) return alert("Tytuł jest wymagany!");
        
        let chords = "", lyrics = raw;
        if(raw.includes("---CHORDS---")) {
            const parts = raw.split("---LYRICS---");
            chords = parts[0].replace("---CHORDS---", "").trim();
            lyrics = parts[1] ? parts[1].trim() : "";
        }
        
        const newSong = { 
            id: currentId || "id_" + Date.now(), 
            title, 
            artist, 
            bpm: bpm ? parseInt(bpm) : 120, 
            chords, 
            lyrics 
        };
        
        if(currentId) {
            const idx = allSongs.findIndex(x => x.id === currentId);
            if (idx !== -1) allSongs[idx] = newSong;
            else allSongs.push(newSong);
        } else {
            allSongs.push(newSong);
            currentId = newSong.id;
        }

        saveToLocal(); 
        renderList(); 
        updateView();
        closeEditor();
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(allSongs, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob); 
        a.download = currentLibrary; 
        a.click();
    }

    function importJSON(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = e => { 
            try {
                const imported = JSON.parse(e.target.result);
                if(Array.isArray(imported)) {
                    allSongs = imported;
                    saveToLocal(); 
                    renderList(); 
                    alert("Zaimportowano pomyślnie!");
                } else {
                    alert("Błędny format pliku. Wymagana lista utworów.");
                }
            } catch(err) { alert("Błędny plik JSON"); }
        };
        reader.readAsText(input.files[0]);
    }

    async function resetFromServer() { 
        if(confirm("Czy na pewno? Spowoduje to bezpowrotną utratę wszystkich lokalnych zmian w tym zbiorze.")) { 
            localStorage.removeItem('db_'+currentLibrary); 
            await loadFromServer(currentLibrary);
        } 
    }
    
    async function exportAllJPG() {
        if(allSongs.length === 0) return alert("Brak piosenek do eksportu.");
        const overlay = document.getElementById('progress-overlay');
        const countDisp = document.getElementById('progress-count');
        overlay.style.display = 'flex';
        document.getElementById('settings-menu').classList.remove('active');
        
        for(let i=0; i<allSongs.length; i++) {
            countDisp.textContent = `${i+1} / ${allSongs.length}`;
            selectSong(allSongs[i].id);
            await new Promise(r => setTimeout(r, 400));
            const captureArea = document.getElementById('song-capture-area');
            const canvas = await html2canvas(captureArea, {
                scale: 2,
                backgroundColor: window.getComputedStyle(captureArea).backgroundColor
            });
            const link = document.createElement('a');
            link.download = `${allSongs[i].title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.8);
            link.click();
            await new Promise(r => setTimeout(r, 200));
        }
        overlay.style.display = 'none';
        alert("Eksport zakończony!");
    }
</script>
</body>
